<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지속적인 개선과 정착</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      max-width: 900px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    img {
      width: 100%;
      border-radius: 12px;
    }
    h1 {
      margin-top: 20px;
      color: #1e293b;
    }
    p {
      color: #475569;
      line-height: 1.7;
      text-align: left;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/img/detail/continuous-improvement.png" alt="지속적인 개선과 정착 이미지" />
    <h1>지속적인 개선과 정착</h1>
    <p>
시스템 구축은 끝이 아니라 업무 효율 개선의 시작이라고 생각합니다.
실제 사용 과정에서 발생하는 문제와 불편을 지속적으로 개선하여,
시스템이 조직에 자연스럽게 정착할 때까지 함께합니다.

운영 중 수집되는 데이터와 사용자 피드백을 기반으로 지속적인 기능 개선 및 고도화
단순 유지보수가 아닌, 업무 변화에 맞춘 능동적인 시스템 개선 제안

결과적으로 시스템은
✔ 사용자가 익숙해지고
✔ 업무 시간이 단축되며
✔ 조직 전체의 생산성이 눈에 띄게 향상될 때까지
지속적으로 진화합니다.
    </p>
  </div>
</body>
</html>
